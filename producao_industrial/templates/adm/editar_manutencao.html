{% extends 'base.html' %}

{% block title %}Editar Manutenção{% endblock %}

{% block content %}
<section class="page-header">
    <div class="page-header-content">
        <div class="page-title">
            <i class="fas fa-tools"></i>
            <h1>Editar Manutenção</h1>
            <p>Máquina: {{ manutencao.maquina.nome }}</p>
        </div>
        <a href="/admin" class="btn btn-secondary">← Voltar</a>
    </div>
</section>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>📝 Descrição</label>
            <textarea name="descricao" rows="4" required>{{ manutencao.descricao }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>✅ Resolvida?</label>
                <select name="resolvida">
                    <option value="False" {% if not manutencao.resolvida %}selected{% endif %}>❌ Não</option>
                    <option value="True" {% if manutencao.resolvida %}selected{% endif %}>✅ Sim</option>
                </select>
            </div>
            <div class="form-group">
                <button type="submit" class="submit-btn">💾 Atualizar</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

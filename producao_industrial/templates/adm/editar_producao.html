{% extends 'base.html' %}

{% block title %}Editar Produção{% endblock %}

{% block content %}
<section class="page-header">
    <div class="page-header-content">
        <div class="page-title">
            <i class="fas fa-box"></i>
            <h1>Editar Produção</h1>
            <p>{{ producao.maquina.nome }} - {{ producao.data.strftime('%d/%m %H:%M') }}</p>
        </div>
        <a href="/producao" class="btn btn-secondary">← Voltar</a>
    </div>
</section>

<div class="form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>📦 Quantidade</label>
                <input type="number" name="quantidade" value="{{ producao.quantidade }}" min="1" required>
            </div>
            <div class="form-group">
                <label>⏱️ Tempo (horas)</label>
                <input type="number" name="tempo" value="{{ producao.tempo }}" step="0.1" min="0.1" required>
            </div>
            <div class="form-group">
                <button type="submit" class="submit-btn">💾 Salvar</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

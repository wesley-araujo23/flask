{% extends 'base.html' %}

{% block title %}Login Admin{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-shield-alt fa-3x" style="color: #00c853;"></i>
            <h1>Painel Admin</h1>
        </div>
        <form method="POST">
            <div class="form-group">
                <label>👤 Usuário</label>
                <input type="text" name="usuario" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label>🔒 Senha</label>
                <input type="password" name="senha" placeholder="123456" required>
            </div>
            <button type="submit" class="submit-btn">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}

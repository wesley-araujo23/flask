{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<!-- Conteúdo igual ao anterior... -->
<section class="page-header">
    <!-- ... header igual ... -->
</section>

<!-- Stats igual... -->
<section class="stats-section">
    <!-- ... stats cards iguais ... -->
</section>

<!-- Charts SEM JavaScript inline -->
<section class="chart-section">
    <div class="chart-card">
        <h3>Status das Máquinas</h3>
        <canvas id="statusChart" data-ligadas="{{ ligadas }}" data-manutencao="{{ manutencao }}" data-paradas="{{ paradas }}"></canvas>
    </div>
</section>
{% endblock %}

<!-- Script EXTERNO -->
{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const canvas = document.getElementById('statusChart');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const ligadas = parseInt(canvas.dataset.ligadas) || 0;
    const manutencao = parseInt(canvas.dataset.manutencao) || 0;
    const paradas = parseInt(canvas.dataset.paradas) || 0;
    
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Ligadas', 'Manutenção', 'Paradas'],
            datasets: [{
                data: [ligadas, manutencao, paradas],
                backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
});
</script>
{% endblock %}
